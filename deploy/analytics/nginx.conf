limit_req_zone $binary_remote_addr zone=analytics_rate:10m rate=10r/s;

upstream gtm_server {
    server gtm-server:8080;
    keepalive 16;
}

upstream gtm_preview {
    server gtm-preview:8080;
    keepalive 4;
}

server {
    listen 8080;
    server_name analytics.dnd-recorder.de;
    access_log off;
    error_log /dev/stderr warn;
    client_max_body_size 64k;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header X-Frame-Options "DENY" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location = /healthy {
        proxy_pass http://gtm_server/healthy;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }

    location / {
        limit_req zone=analytics_rate burst=30 nodelay;
        limit_except GET POST OPTIONS { deny all; }

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "https://dnd-recorder.de" always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type" always;
            add_header Access-Control-Max-Age 86400 always;
            return 204;
        }

        proxy_pass http://gtm_server;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For "0.0.0.0";
        proxy_set_header X-Real-IP "0.0.0.0";
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin "https://dnd-recorder.de" always;
        proxy_connect_timeout 3s;
        proxy_read_timeout 30s;
    }
}

server {
    listen 8082;
    server_name analytics-preview.dnd-recorder.de;
    access_log off;
    error_log /dev/stderr warn;
    client_max_body_size 64k;

    add_header X-Robots-Tag "noindex, nofollow" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        limit_req zone=analytics_rate burst=10 nodelay;
        proxy_pass http://gtm_preview;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For "0.0.0.0";
        proxy_set_header X-Real-IP "0.0.0.0";
        proxy_connect_timeout 3s;
        proxy_read_timeout 30s;
    }
}
