server {
    listen 80;
    server_name dndbot.haffelpaff.de;

    return 308 https://dnd-recorder.de$request_uri;
}

server {
    listen 80 default_server;
    server_name dnd-recorder.de localhost _;

    # Allow avatar/character-sheet/campaign-background/uploads up to 20 MB.
    # Without this, nginx's default 1 MB limit returns HTTP 413 for any
    # reasonably sized image upload (e.g. a 2 MB PNG avatar).
    client_max_body_size 20m;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "same-origin" always;
    add_header X-Frame-Options "DENY" always;
    add_header Permissions-Policy "camera=(), geolocation=(), microphone=(), payment=(), usb=()" always;
    # Keep legal contact details and the consent UI accessible without
    # Cloudflare rewriting the HTML into a JavaScript-only representation.
    add_header Cache-Control "no-transform" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; script-src 'self' https://analytics.dnd-recorder.de; connect-src 'self' https://analytics.dnd-recorder.de; img-src 'self' data: blob: https://analytics.dnd-recorder.de; media-src 'self' blob:; style-src 'self' 'unsafe-inline'; font-src 'self' data:; frame-src https://analytics.dnd-recorder.de; upgrade-insecure-requests" always;

    # Docker internal DNS resolver
    resolver 127.0.0.11 valid=10s;

    # Frontend SPA
    location / {
        set $frontend http://dnd-frontend:80;
        proxy_pass $frontend;
        proxy_set_header Host $host;
    }

    # Uploads (served by backend)
    location /uploads/ {
        set $backend http://dnd-backend:3001;
        proxy_pass $backend;
        proxy_set_header Host $host;
    }

    # Internal endpoints are reachable only on the Docker network.
    location ^~ /api/internal/ {
        return 404;
    }

    # Backend API — strips /api prefix, passes rest to backend
    location /api/ {
        set $backend http://dnd-backend:3001;
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 5s;
        proxy_read_timeout 360s;
    }

    # Health check direct
    location /health {
        set $backend http://dnd-backend:3001;
        proxy_pass $backend/health;
        proxy_set_header Host $host;
    }
}
