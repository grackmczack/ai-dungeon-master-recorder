server {
    listen 80;
    server_name _;

    # Docker internal DNS resolver
    resolver 127.0.0.11 valid=10s;

    # Frontend SPA
    location / {
        set $frontend http://dnd-frontend:80;
        proxy_pass $frontend;
        proxy_set_header Host $host;
    }

    # Uploads (served by backend)
    location /uploads/ {
        set $backend http://dnd-backend:3001;
        proxy_pass $backend;
        proxy_set_header Host $host;
    }

    # Backend API — strips /api prefix, passes rest to backend
    location /api/ {
        set $backend http://dnd-backend:3001;
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
    }

    # Health check direct
    location /health {
        set $backend http://dnd-backend:3001;
        proxy_pass $backend/health;
        proxy_set_header Host $host;
    }
}
