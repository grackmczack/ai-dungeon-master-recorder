name: dnd-recorder

services:
  discord-recorder:
    build:
      context: .
      dockerfile: apps/discord-recorder/Dockerfile
    container_name: dnd-discord-recorder
    restart: unless-stopped
    env_file:
      - apps/discord-recorder/.env
    volumes:
      - ./storage/recordings:/app/storage/recordings
    networks:
      - dnd-network
    depends_on:
      redis:
        condition: service_healthy

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: dnd-backend
    restart: unless-stopped
    env_file:
      - apps/backend/.env
    expose:
      - "3001"
    volumes:
      - ./storage/recordings:/app/storage/recordings
      - ./storage/avatars:/app/storage/avatars
      - ./storage/character-sheets:/app/storage/character-sheets
      - ./storage/campaign-backgrounds:/app/storage/campaign-backgrounds
      - ./storage/session-images:/app/storage/session-images
    networks:
      - dnd-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  transcriber:
    build:
      context: .
      dockerfile: services/transcriber/Dockerfile
    container_name: dnd-transcriber
    restart: unless-stopped
    env_file:
      - services/transcriber/.env
    volumes:
      - ./storage/recordings:/app/storage/recordings
    networks:
      - dnd-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: dnd-postgres
    restart: unless-stopped
    env_file:
      - .env.postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - dnd-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_dungeon -d ai_dungeon_master_recorder"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dnd-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - dnd-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    container_name: dnd-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - dnd-network
    depends_on:
      - backend
      - frontend

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: dnd-frontend
    restart: unless-stopped
    networks:
      - dnd-network

volumes:
  # Project-specific stable names keep production data attached when the
  # Compose working directory or Plesk subscription changes.
  postgres_data:
    name: dnd_recorder_postgres_data
  redis_data:
    name: dnd_recorder_redis_data

networks:
  dnd-network:
    name: dnd_recorder_network
    driver: bridge
