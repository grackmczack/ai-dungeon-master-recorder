services:
  discord-recorder:
    build:
      context: .
      dockerfile: apps/discord-recorder/Dockerfile
    container_name: dnd-discord-recorder
    restart: unless-stopped
    env_file:
      - apps/discord-recorder/.env
    volumes:
      - recordings:/app/storage/recordings
    networks:
      - dnd-network
    depends_on:
      redis:
        condition: service_healthy

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: dnd-backend
    restart: unless-stopped
    env_file:
      - apps/backend/.env
    ports:
      - "3001:3001"
    volumes:
      - recordings:/app/storage/recordings
    networks:
      - dnd-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: dnd-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ai_dungeon_master_recorder
      POSTGRES_USER: ai_dungeon
      POSTGRES_PASSWORD: ai_dungeon_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - dnd-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_dungeon -d ai_dungeon_master_recorder"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dnd-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - dnd-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    container_name: dnd-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro
    networks:
      - dnd-network
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  recordings:
    driver: local
  frontend_dist:

networks:
  dnd-network:
    driver: bridge
